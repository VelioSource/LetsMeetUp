<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylechat.css">
    <title>Chat</title>
</head>
<body>
    <div id="wrapper">

        <div id="left_pannel">
            <div id="user_info" style="padding: 10px;">
                <img id="profile_image" src="ui/images/user_male.jpg">
                <br>
                <span id="username"> Username </span>
                <br>
               <span id="email" style="font-size: 12px; opacity: 50%;">email@gmail.com</span> 
                
               <br>
               <br>
               <br>

               <div>
                    <label id="label_chat" for="chat_box">Chat <img src="./ui/icons/Chats-icon.png"></label>
                    <label id="label_contacts" for="contact_box">Contacts <img src="./ui/icons/contacts.png"></label>
                    <label id="label_settings" for="settings_box">Settings <img src="./ui/icons/settings.png"></label>
                    <label id="logout" for="settings_logout">Logout <img src="./ui/icons/logout.png"></label>

                </div>

            </div>

            
        </div>

        <div id="right_pannel">
            <div id="header">Let's Meet Up!</div>
            <div id="container">

               
                <div id="inner_left_pannel">
                    <div id="contact_pannel">
                        <div id="contact">
                            <img src="./ui/images/user1.jpg" alt="user2">
                            <br>Username
                        </div>
                       
                        <div id="contact">
                            <img src="./ui/images/user2.jpg" alt="user2">
                            <br>Username
                        </div>
                       
                        <div id="contact">
                            <img src="./ui/images/user3.jpg" alt="user2">
                            <br>Username
                       
                        </div>
                    </div>
                </div>
                
                <input type="radio" id="chat_box" name="banana" style="display: none;">
                <input type="radio" id="contact_box" name="banana" style="display: none;">
                <input type="radio" id="settings_box" name="banana" style="display: none;">

                <div id="inner_right_pannel"></div>
           
            </div>
        </div>

    </div>
</body>
</html>

<script type="text/javascript">
  
  function _(element) {
        return document.getElementById(element);
   }

   function logout_user()
   {
        var answer = confirm("Are you sure you want to log out?");
        if(answer){
            get_data({}, "logout");
        }
   
   }

   var logout = _("logout");
   logout.addEventListener("click", logout_user);

   function get_data(find, type){
        var xml=new XMLHttpRequest();

        xml.onload = function(){
            if(xml.readyState == 4 || xml.status == 200)
            {
               handle_result(xml.responseText, type);     
            }
        }
        
        var data = {};
        data.find = find;
        data.data_type= type;
        data = JSON.stringify(data);
        
        xml.open("POST", "api.php", true);
        xml.send(data);
   }

   function handle_result(result,type){
    
    if(result.trim() != ""){
       
        var obj= JSON.parse(result);
        if(typeof(obj.logged_in) != "undefined" && !obj.logged_in)
        {
            window.location = "login.html"
        }else{
            switch(obj.data_type){
                case "user_info":
                    var username = _("username");
                    var email = _("email");
                    username.innerHTML = obj.username;
                    email.innerHTML = obj.email;
                break;
            }
        }

        }
    
   }

   get_data({},"user_info");

</script>
